# === Data Generation ===
data:
  H_min: 0.01
  H_max: 0.99
  n_H_values: 100          # number of equally spaced H values
  samples_per_H: 210       # 210 * 100 = 21,000 total
  series_length: 100       # T = 100 time steps
  split_ratios: [0.333, 0.333, 0.334]  # train/val/test (1/3 each)
  seed: 42

# === Training ===
training:
  batch_size: 256
  learning_rate: 0.001
  epochs: 100
  patience: 10             # early stopping patience
  device: "auto"           # auto, cpu, cuda, mps

# === Paths ===
paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  models: "models/saved"
  plots: "plots"
